<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome Home</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f6f9; }
        .dashboard-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        h1 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }
        .logout-btn { background-color: #e02424; color: white; border: none; padding: 12px 24px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: background 0.2s; width: 100%; }
        .logout-btn:hover { background-color: #c81e1e; }
    </style>
</head>
<body>

<div class="dashboard-card">
    <h1>Welcome, {{ user.username }}!</h1>
    <p>You have successfully authenticated via your third-party account profile application setup.</p>
    
    <!-- This fires a standard routing request straight to your logout loop -->
    <form action="{% url 'logout' %}" method="post">
        {% csrf_token %}
        <button class="logout-btn" type="submit">Log Out of All Accounts</button>
    </form>
</div>

</body>
</html>
