{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit New Post</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'accounts/css_files/create_post.css' %}">
</head>

<body>

    <nav class="navbar-custom">
        <div class="logo">
            Instagram Clone
        </div>
        <div class="nav-links">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'create_post' %}">+ New Post</a>
            <a href="{% url 'profile_view' request.user.username %}" class="active">
                Profile
            </a>
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="logout-btn">
                    Logout
                </button>
            </form>
        </div>
    </nav>
    <div class="post-card">

        <h2 class="post-title">📸 Edit Your Post</h2>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-4">
                <label class="form-label">What's on your mind?</label>
                {{ form.content }}
            </div>

            <div class="mb-4">
                <label class="form-label">Change Photo</label>

                <div class="upload-box">
                    <span class="emoji">🖼️</span>
                    {{ form.image }}
                </div>
            </div>
            <button type="submit" class="btn btn-publish w-100">
                🚀 Edit Post
            </button>
        </form>
    </div>

</body>
</html>
